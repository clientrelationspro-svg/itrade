<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 连接测试</title>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>🔧 API 连接测试工具</h1>
  
  <div>
    <strong>后端 URL:</strong> <code id="api-url">检测中...</code>
  </div>
  
  <h2>🧪 测试结果:</h2>
  <pre id="result">等待测试...</pre>
  
  <button onclick="testAPI()">🚀 开始测试 API 连接</button>
  <button onclick="clearResult()">🧹 清空结果</button>
  
  <script>
    async function testAPI() {
      const resultEl = document.getElementById('result');
      const apiUrlEl = document.getElementById('api-url');
      
      // 后端 URL
      const apiUrl = 'https://ai-trade-platform-api.onrender.com';
      apiUrlEl.textContent = apiUrl;
      
      resultEl.textContent = '⏳ 测试中...\n\n';
      
      try {
        // 测试 1: 根路径
        resultEl.textContent += '1️⃣ 测试根路径 (GET /)...\n';
        const rootResp = await axios.get(apiUrl + '/');
        resultEl.textContent += '✅ 成功: ' + JSON.stringify(rootResp.data) + '\n\n';
        
        // 测试 2: 登录 API（预期 401）
        resultEl.textContent += '2️⃣ 测试登录 API (POST /api/auth/login)...\n';
        try {
          const loginResp = await axios.post(apiUrl + '/api/auth/login', {
            username: 'test',
            password: 'test'
          });
          resultEl.textContent += '✅ 登录成功: ' + JSON.stringify(loginResp.data) + '\n\n';
        } catch (loginErr) {
          if (loginErr.response && loginErr.response.status === 401) {
            resultEl.textContent += '✅ 登录 API 正常 (返回 401 未授权): ' + JSON.stringify(loginErr.response.data) + '\n\n';
          } else if (loginErr.response) {
            resultEl.textContent += '⚠️ 登录 API 返回: ' + loginErr.response.status + ' ' + JSON.stringify(loginErr.response.data) + '\n\n';
          } else {
            resultEl.textContent += '❌ 登录 API 失败: ' + loginErr.message + '\n\n';
          }
        }
        
        // 测试 3: CORS 预检请求
        resultEl.textContent += '3️⃣ 测试 CORS 配置...\n';
        try {
          const corsResp = await axios.options(apiUrl + '/api/auth/login', {
            headers: {
              'Access-Control-Request-Method': 'POST',
              'Access-Control-Request-Headers': 'Authorization, Content-Type'
            }
          });
          resultEl.textContent += '✅ CORS 预检成功\n\n';
        } catch (corsErr) {
          resultEl.textContent += '⚠️ CORS 预检失败 (可能是正常行为): ' + (corsErr.response?.status || corsErr.message) + '\n\n';
        }
        
        resultEl.textContent += '✅ 所有测试完成！后端 API 正常工作。\n';
        resultEl.className = 'success';
        
      } catch (err) {
        resultEl.textContent += '❌ 测试失败: ' + err.message + '\n';
        if (err.response) {
          resultEl.textContent += '响应状态: ' + err.response.status + '\n';
          resultEl.textContent += '响应数据: ' + JSON.stringify(err.response.data) + '\n';
        }
        resultEl.className = 'error';
      }
    }
    
    function clearResult() {
      document.getElementById('result').textContent = '等待测试...';
      document.getElementById('result').className = '';
    }
  </script>
</body>
</html>
