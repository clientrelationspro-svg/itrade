<!DOCTYPE html>
<html>
<head>
  <title>API 连接测试</title>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
  <h1>API 连接测试</h1>
  
  <div>
    <strong>后端 URL:</strong> <span id="api-url">检测中...</span>
  </div>
  
  <h2>测试结果:</h2>
  <pre id="result">等待测试...</pre>
  
  <button onclick="testAPI()">测试 API 连接</button>
  
  <script>
    async function testAPI() {
      const resultEl = document.getElementById('result');
      const apiUrlEl = document.getElementById('api-url');
      
      // 读取环境变量（Vite 注入）
      const apiUrl = window.__VITE_API_URL__ || 'https://ai-trade-platform-api.onrender.com';
      apiUrlEl.textContent = apiUrl;
      
      resultEl.textContent = '测试中...\n';
      
      try {
        // 测试 1: 根路径
        resultEl.textContent += '1. 测试根路径...\n';
        const rootResp = await axios.get(apiUrl + '/');
        resultEl.textContent += '✅ 根路径成功: ' + JSON.stringify(rootResp.data) + '\n\n';
        
        // 测试 2: 登录 API
        resultEl.textContent += '2. 测试登录 API...\n';
        try {
          const loginResp = await axios.post(apiUrl + '/api/auth/login', {
            username: 'test',
            password: 'test'
          });
          resultEl.textContent += '✅ 登录 API 成功: ' + JSON.stringify(loginResp.data) + '\n\n';
        } catch (loginErr) {
          if (loginErr.response) {
            resultEl.textContent += '⚠️ 登录 API 返回: ' + loginErr.response.status + ' ' + JSON.stringify(loginErr.response.data) + '\n\n';
          } else {
            resultEl.textContent += '❌ 登录 API 失败: ' + loginErr.message + '\n\n';
          }
        }
        
      } catch (err) {
        resultEl.textContent += '❌ 测试失败: ' + err.message + '\n';
        if (err.response) {
          resultEl.textContent += '响应状态: ' + err.response.status + '\n';
          resultEl.textContent += '响应数据: ' + JSON.stringify(err.response.data) + '\n';
        }
      }
    }
  </script>
</body>
</html>
