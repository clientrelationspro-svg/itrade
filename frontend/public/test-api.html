<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>API 连接测试</title>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
    .container { background: white; padding: 30px; border-radius: 10px; }
    pre { background: #f0f0f0; padding: 15px; border-radius: 5px; overflow-x: auto; }
    .ok { color: green; font-weight: bold; }
    .err { color: red; font-weight: bold; }
    button { padding: 12px 24px; margin: 10px; cursor: pointer; font-size: 16px; border: none; border-radius: 5px; background: #007bff; color: white; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 API 连接测试</h1>
    <p>后端: <code id="url">https://ai-trade-platform-api.onrender.com/api</code></p>
    
    <button onclick="test()">🚀 开始测试</button>
    <pre id="out">点击按钮测试...</pre>
  </div>

  <script>
    const API = 'https://ai-trade-platform-api.onrender.com/api';

    async function test() {
      const o = document.getElementById('out');
      const log = (msg, cls) => o.innerHTML += `<span class="${cls}">${msg}</span>\n`;

      o.innerHTML = '测试中...\n';
      
      // 1. 登录 POST
      try {
        const r = await axios.post(API + '/auth/login', { username: 'test', password: 'test' });
        log('1. POST /auth/login: ✅ ' + r.status + ' ' + JSON.stringify(r.data), 'ok');
      } catch(e) {
        const s = e.response?.status || 'ERR';
        const d = e.response?.data?.detail || e.message;
        log('1. POST /auth/login: ' + (s === 401 ? '✅ ' : '❌ ') + s + ' ' + d, s === 401 ? 'ok' : 'err');
      }

      // 2. 客户列表 GET
      try {
        const r = await axios.get(API + '/customers');
        log('2. GET /customers: ✅ ' + r.status + ' items:' + (r.data?.items?.length || r.data?.total || 0), 'ok');
      } catch(e) {
        log('2. GET /customers: ❌ ' + (e.response?.status || 'ERR') + ' ' + e.message, 'err');
      }

      // 3. Dashboard GET
      try {
        const r = await axios.get(API + '/dashboard');
        log('3. GET /dashboard: ✅ ' + r.status, 'ok');
      } catch(e) {
        log('3. GET /dashboard: ❌ ' + (e.response?.status || 'ERR') + ' ' + e.message, 'err');
      }

      // 4. Register POST
      try {
        const r = await axios.post(API + '/auth/register', { username: 'test2', password: 'test2', email: 't@t.com' });
        log('4. POST /auth/register: ✅ ' + r.status + ' ' + JSON.stringify(r.data), 'ok');
      } catch(e) {
        const s = e.response?.status || 'ERR';
        log('4. POST /auth/register: ' + (s === 400 ? '✅ ' : '❌ ') + s + ' ' + (e.response?.data?.detail || e.message), s === 400 ? 'ok' : 'err');
      }

      log('\n✅ 测试完成！', 'ok');
    }
  </script>
</body>
</html>
